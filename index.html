<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الأستاذ عمر - سحابي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Firebase Core SDK -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
:root { --p:#1a5276; --g:#c9a84c; --bg:#f4f7f6; --s-w:260px; }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
body { background:var(--bg); direction:rtl; }

/* Loader */
#loader { position:fixed; inset:0; background:white; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; font-weight:700; }
.spinner { width:40px; height:40px; border:4px solid #eee; border-top:4px solid var(--p); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:15px; }
@keyframes spin { 100% { transform:rotate(360deg); } }

/* Auth */
#auth-w { position:fixed; inset:0; background:linear-gradient(135deg,#0d2137,#1a5276); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.auth-c { background:white; padding:30px; border-radius:20px; width:100%; max-width:400px; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
.tab-b { display:flex; background:#eee; border-radius:10px; padding:5px; margin-bottom:20px; }
.tab { flex:1; border:none; padding:10px; cursor:pointer; border-radius:8px; font-weight:700; background:none; }
.tab.active { background:white; color:var(--p); box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.inp { width:100%; padding:12px; margin-bottom:15px; border:2px solid #eee; border-radius:10px; outline:none; font-size:14px; }
.btn { width:100%; padding:12px; border:none; border-radius:10px; background:var(--p); color:white; font-weight:700; cursor:pointer; }

/* Main App */
#app { display:none; }
.sidebar { position:fixed; top:0; right:0; bottom:0; width:var(--s-w); background:#0d2137; color:white; padding:20px; z-index:100; transition:0.3s; }
.main { margin-right:var(--s-w); padding:20px; transition:0.3s; }
.card { background:white; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05); margin-bottom:20px; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:12px; text-align:right; border-bottom:1px solid #eee; font-size:14px; }
.hw-i { background:#f0f7ff; padding:10px; border-radius:10px; margin-bottom:10px; border-right:4px solid var(--p); }

@media (max-width:768px) {
    .sidebar { transform:translateX(100%); }
    .sidebar.open { transform:translateX(0); }
    .main { margin-right:0; }
    .mob-h { display:flex; background:var(--p); color:white; padding:15px; justify-content:space-between; align-items:center; }
}

/* Toast */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background:#333; color:white; padding:10px 20px; border-radius:20px; transition:0.3s; z-index:10000; }
#toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div>جاري الاتصال بالسحاب...</div>
<div id="toast"></div>

<!-- Login Section -->
<div id="auth-w">
    <div class="auth-c">
        <h2 style="text-align:center; color:var(--p); margin-bottom:20px;">📚 نظام الأستاذ عمر</h2>
        <div class="tab-b">
            <button class="tab active" onclick="shA('l')">دخول</button>
            <button class="tab" onclick="shA('r')">جديد</button>
        </div>
        <div id="form-l">
            <input type="text" id="l-id" class="inp" placeholder="الاسم (عمر / omar)">
            <input type="password" id="l-pw" class="inp" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول</button>
        </div>
        <div id="form-r" style="display:none">
            <input type="text" id="r-n" class="inp" placeholder="الاسم الكامل">
            <input type="text" id="r-p" class="inp" placeholder="رقم الهاتف">
            <input type="password" id="r-w" class="inp" placeholder="كلمة المرور">
            <button class="btn" onclick="reg()">إنشاء الحساب</button>
        </div>
    </div>
</div>

<!-- App Section -->
<div id="app">
    <div class="mob-h" style="display:none">
        <button onclick="togS(true)" style="background:none; border:none; color:white; font-size:20px;">☰</button>
        <b>نظام الأستاذ عمر</b>
        <div style="width:20px"></div>
    </div>

    <div class="sidebar" id="side">
        <div style="text-align:center; margin-bottom:30px">
            <div style="width:60px; height:60px; background:var(--g); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900;" id="av">ع</div>
            <h3 id="u-name">...</h3>
            <small id="u-role" style="color:#aaa"></small>
        </div>
        <div id="nav"></div>
        <button onclick="location.reload()" style="margin-top:30px; width:100%; background:none; border:1px solid #ff8a80; color:#ff8a80; padding:10px; border-radius:10px; cursor:pointer;">🚪 خروج</button>
    </div>

    <div class="main" onclick="togS(false)">
        <!-- Admin View -->
        <div id="p-adm" class="pg" style="display:none">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <h3>👥 الطلاب</h3>
                    <button class="btn" style="width:auto; padding:5px 15px" onclick="setSt()">إعداد طالب</button>
                </div>
                <table>
                    <thead><tr><th>اسم الطالب</th><th>متبقي</th><th>إجراء</th></tr></thead>
                    <tbody id="st-list"></tbody>
                </table>
            </div>
            <div class="card">
                <h3>📝 إرسال واجب</h3>
                <select id="hw-s" class="inp"></select>
                <textarea id="hw-t" class="inp" style="height:80px" placeholder="نص الواجب..."></textarea>
                <button class="btn" onclick="sendHw()">إرسال</button>
            </div>
        </div>

        <!-- Student View -->
        <div id="p-std" class="pg" style="display:none">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <div class="card" style="text-align:center"><h4>📚 حصص متبقية</h4><h1 id="s-rem" style="color:var(--p)">0</h1></div>
                <div class="card" style="text-align:center"><h4>💰 الرسوم</h4><h1 id="s-fee" style="color:var(--g)">0</h1></div>
            </div>
            <div class="card">
                <h3>📝 واجباتي</h3>
                <div id="my-hw" style="margin-top:15px"></div>
            </div>
        </div>
    </div>
</div>

<script>
// 🔥 Firebase Bilgilerin (Tam ve Doğru)
const config = {
  apiKey: "AIzaSyCXuhxjwoxRSje-rL-1kylgWOIUUwnFtZ8",
  authDomain: "bsaer-omar-ahmed.firebaseapp.com",
  databaseURL: "https://bsaer-omar-ahmed-default-rtdb.firebaseio.com",
  projectId: "bsaer-omar-ahmed",
  storageBucket: "bsaer-omar-ahmed.firebasestorage.app",
  messagingSenderId: "246394105206",
  appId: "1:246394105206:web:0337e80d87cb8fcc7e9e57"
};

firebase.initializeApp(config);
const db = firebase.database();

let users = {}, stData = {}, hws = {}, me = null;

// Real-time Sync (Veri her değiştiğinde burası çalışır)
db.ref('/').on('value', s => {
    const data = s.val() || {};
    users = data.users || {};
    stData = data.stData || {};
    hws = data.hws || {};
    document.getElementById('loader').style.display = 'none';
    render();
});

function login() {
    const id = document.getElementById('l-id').value.trim();
    const pw = document.getElementById('l-pw').value;
    if((id.toLowerCase()==='omar' || id==='عمر') && pw==='123') {
        me = {id:'admin', name:'الأستاذ عمر', role:'admin'};
    } else {
        me = Object.values(users).find(u => (u.name===id || u.phone===id) && u.pass===pw);
    }
    if(me) start(); else toast('خطأ في البيانات');
}

function reg() {
    const n = document.getElementById('r-n').value, p = document.getElementById('r-p').value, w = document.getElementById('r-w').value;
    if(!n || !w) return toast('أكمل البيانات');
    const uid = 'u' + Date.now();
    db.ref('users/'+uid).set({id:uid, name:n, phone:p, pass:w, role:'student'})
    .then(()=>{ toast('تم التسجيل'); shA('l'); });
}

function start() {
    document.getElementById('auth-w').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('u-name').innerText = me.name;
    document.getElementById('u-role').innerText = me.role==='admin'?'أستاذ':'طالب';
    document.getElementById('av').innerText = me.name[0];
    render();
}

function render() {
    if(!me) return;
    const isAdm = me.role==='admin';
    document.getElementById('p-adm').style.display = isAdm?'block':'none';
    document.getElementById('p-std').style.display = isAdm?'none':'block';

    if(isAdm) {
        const stds = Object.values(users).filter(u => u.role==='student');
        document.getElementById('st-list').innerHTML = stds.map(u => {
            const d = stData[u.id] || {rem:0};
            return <tr><td>${u.name}</td><td><b>${d.rem}</b></td><td><button onclick="att('${u.id}')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:5px">حضر</button></td></tr>;
        }).join('');
        document.getElementById('hw-s').innerHTML = stds.map(u => <option value="${u.id}">${u.name}</option>).join('');
    } else {
        const d = stData[me.id] || {rem:0, fee:0};
        document.getElementById('s-rem').innerText = d.rem;
        document.getElementById('s-fee').innerText = d.fee;
        const myHw = Object.values(hws).filter(h => h.sid===me.id).reverse();
        document.getElementById('my-hw').innerHTML = myHw.map(h => <div class="hw-i"><small>${h.date}</small><p>${h.txt}</p></div>).join('');
    }
}

function att(id) {
    const cur = (stData[id] ? stData[id].rem : 0);
    if(cur <= 0) return toast('لا توجد حصص');
    db.ref('stData/'+id+'/rem').set(cur - 1);
}

function setSt() {
    const id = prompt('أدخل ID الطالب من القائمة (أو سيتم تحسين هذا الزر لاحقاً)');
    const rem = prompt('عدد الحصص:');
    const fee = prompt('الرسوم:');
    if(id && rem) db.ref('stData/'+id).set({rem: parseInt(rem), fee: parseInt(fee)||0});
}

function sendHw() {
    const sid = document.getElementById('hw-s').value, txt = document.getElementById('hw-t').value;
    if(!txt) return;
    db.ref('hws/'+Date.now()).set({sid, txt, date: new Date().toLocaleDateString('ar-EG')});
    document.getElementById('hw-t').value = '';
    toast('تم الإرسال');
}

  
function toast(m) {
    const t = document.getElementById('toast'); t.innerText = m; t.className = 'show';
    setTimeout(()=>t.className='', 3000);
}
function shA(m) {
    document.getElementById('form-l').style.display = m==='l'?'block':'none';
    document.getElementById('form-r').style.display = m==='r'?'block':'none';
    document.querySelectorAll('.tab').forEach((t,i) => t.className = (i===(m==='l'?0:1)?'tab active':'tab'));
}
function togS(o) { document.getElementById('side').className = 'sidebar' + (o?' open':''); }
</script>
</body>
</html>
