<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الأستاذ عمر - سحابي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Firebase Kütüphaneleri -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
:root {
  --primary: #1a5276;
  --primary-dark: #0d3557;
  --gold: #c9a84c;
  --bg: #f0ede6;
  --sidebar-w: 270px;
  --green: #27ae60;
  --red: #e74c3c;
  --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); direction:rtl; overflow-x:hidden; }

/* Loader */
#loader { position:fixed; inset:0; background:white; z-index:10000; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.spinner { width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--primary); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }

/* Login */
#auth-wrap { position:fixed; inset:0; z-index:9999; background: linear-gradient(135deg, #0d2137 0%, #1a5276 100%); display:flex; align-items:center; justify-content:center; padding:15px; }
.auth-card { background:white; padding:35px 30px; border-radius:24px; width:100%; max-width:420px; box-shadow: 0 30px 80px rgba(0,0,0,0.4); }
.auth-logo { text-align:center; margin-bottom:25px; }
.auth-logo h1 { color:var(--primary); font-size:26px; font-weight:900; }
.tabs { display:flex; background:#f0f0f0; border-radius:12px; margin-bottom:25px; padding:5px; gap:5px; }
.tab { flex:1; padding:10px; border:none; background:none; cursor:pointer; font-weight:700; border-radius:9px; font-size:14px; color:#666; transition:.2s; }
.tab.active { background:white; color:var(--primary); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.f-group { margin-bottom:16px; }
.f-group label { display:block; margin-bottom:6px; font-size:13px; font-weight:700; color:#333; }
.inp { width:100%; padding:13px 15px; border:2px solid #e8e8e8; border-radius:12px; outline:none; text-align:right; font-size:14px; background:#fafafa; }
.btn-main { width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-size:15px; }

/* Sidebar & Content */
#app { display:none; min-height:100vh; }
.sidebar { position:fixed; top:0; right:0; bottom:0; width:var(--sidebar-w); background: linear-gradient(180deg, #0d2137 0%, #1a5276 100%); color:white; z-index:1000; transition:.3s; display:flex; flex-direction:column; }
.sidebar-header { padding:25px 20px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); }
.avatar { width:60px; height:60px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; margin:0 auto 10px; color:white; }
.nav-item { padding:14px 20px; cursor:pointer; color:rgba(255,255,255,0.7); display:flex; align-items:center; gap:10px; font-size:14px; transition:.2s; }
.nav-item:hover, .nav-item.active { background:rgba(255,255,255,0.1); color:white; }
.main-content { margin-right:var(--sidebar-w); padding:25px; transition:.3s; }
.mobile-bar { display:none; background:var(--primary); color:white; padding:15px 20px; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:999; }
.card { background:white; padding:20px; border-radius:18px; box-shadow:var(--card-shadow); margin-bottom:20px; }
.stat-card { background:white; padding:20px; border-radius:18px; text-align:center; box-shadow:var(--card-shadow); }
.big-num { font-size:38px; font-weight:900; color:var(--primary); }

.table-wrap { width:100%; overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:450px; }
th, td { padding:12px; text-align:right; border-bottom:1px solid #eee; font-size:14px; }
th { background:#f9f9f9; }

@media (max-width:768px) {
  .sidebar { transform:translateX(100%); }
  .sidebar.open { transform:translateX(0); }
  .main-content { margin-right:0; }
  .mobile-bar { display:flex; }
}

#toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:#333; color:white; padding:10px 25px; border-radius:50px; z-index:10001; transition:.3s; }
#toast.show { transform:translateX(-50%) translateY(0); }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:2000; padding:15px; }
.modal { background:white; padding:25px; border-radius:20px; width:100%; max-width:400px; }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:15px">جاري الاتصال بالسحاب...</p></div>
<div id="toast"></div>

<!-- Login Section -->
<div id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>📚 نظام الأستاذ عمر</h1>
      <p>الإدارة الذكية والمزامنة الفورية</p>
    </div>
    <div class="tabs">
      <button class="tab active" id="tl" onclick="authT('login')">دخول</button>
      <button class="tab" id="tr" onclick="authT('reg')">حساب جديد</button>
    </div>
    <div id="a-login">
      <div class="f-group"><label>الاسم (عمر / omar)</label><input type="text" id="lid" class="inp" placeholder="اكتب اسم المستخدم"></div>
      <div class="f-group"><label>كلمة المرور</label><input type="password" id="lpw" class="inp" placeholder="••••••••"></div>
      <button class="btn-main" onclick="doLogin()">دخول للنظام</button>
    </div>
    <div id="a-reg" style="display:none">
      <div class="f-group"><label>الاسم الكامل</label><input type="text" id="rn" class="inp" placeholder="اسم الطالب"></div>
      <div class="f-group"><label>الهاتف</label><input type="text" id="rp" class="inp" placeholder="05xxxxxxxx"></div>
      <div class="f-group"><label>كلمة المرور</label><input type="password" id="rw" class="inp" placeholder="••••••••"></div>
      <button class="btn-main" onclick="doReg()">إنشاء حساب</button>
    </div>
  </div>
</div>

<!-- Main Application -->
<div id="app">
  <div class="mobile-bar">
    <button onclick="togSide(true)" style="background:none;border:none;color:white;font-size:22px;">☰</button>
    <span style="font-weight:700;">📚 الأستاذ عمر</span>
    <div style="width:22px"></div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="avatar" id="av-txt">ع</div>
      <h3 id="sname">...</h3>
      <small id="srole">...</small>
    </div>
    <nav id="nlist"></nav>
    <div style="padding:20px; margin-top:auto">
        <button onclick="doLogout()" style="width:100%; padding:10px; background:rgba(255,0,0,0.1); color:#ff8a80; border:none; border-radius:10px; cursor:pointer;">🚪 تسجيل الخروج</button>
    </div>
  </div>

  <div class="main-content">
    <div id="p-admin" class="page" style="display:none">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3>👥 قائمة الطلاب</h3>
            <button class="btn-main" style="width:auto; padding:8px 15px" onclick="opStM()">+ إعدادات طالب</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>الطالب</th><th>متبقي</th><th>الإجمالي</th><th>الرسوم</th><th>إجراء</th></tr></thead>
            <tbody id="stbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="p-std" class="page" style="display:none">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
        <div class="stat-card"><h4>📚 الحصص المتبقية</h4><div class="big-num" id="s-rem">0</div></div>
        <div class="stat-card"><h4>💰 الرسوم</h4><div class="big-num" id="s-fee" style="color:var(--gold)">0</div></div>
      </div>
      <div class="card" style="margin-top:20px">
        <h3>📝 الواجبات المرسلة</h3>
        <div id="st-hw" style="margin-top:15px"></div>
      </div>
    </div>
    
    <div id="p-hw" class="page" style="display:none">
        <div class="card">
            <h3>📝 إرسال واجب جديد</h3>
            <div class="f-group"><label>اختر الطالب</label><select id="hw-sel" class="inp"></select></div>
            <div class="f-group"><label>نص الواجب</label><textarea id="hw-txt" class="inp" style="height:100px"></textarea></div>
            <button class="btn-main" onclick="sendHW()">إرسال الواجب</button>
        </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="mst">
  <div class="modal">
    <h3>⚙️ إعدادات الحصص</h3>
    <div class="f-group"><label>الطالب</label><select id="mst-id" class="inp"></select></div>
    <div class="f-group"><label>إجمالي الحصص</label><input type="number" id="mst-t" class="inp"></div>
    <div class="f-group"><label>الرسوم المستحقة</label><input type="number" id="mst-f" class="inp"></div>
    <button class="btn-main" onclick="svSt()">حفظ البيانات</button>
    <button class="btn-main" style="background:#ccc; margin-top:8px" onclick="clM()">إلغاء</button>
  </div>
</div>

<script>
// 🔥 SENİN FİREBASE BİLGİLERİN BURADA
const firebaseConfig = {
  apiKey: "AIzaSyCXuhxjwoxRSje-rL-1kylgWOIUUwnFtZ8",
  authDomain: "bsaer-omar-ahmed.firebaseapp.com",
  databaseURL: "https://bsaer-omar-ahmed-default-rtdb.firebaseio.com",
  projectId: "bsaer-omar-ahmed",
  storageBucket: "bsaer-omar-ahmed.firebasestorage.app",
  messagingSenderId: "246394105206",
  appId: "1:246394105206:web:0337e80d87cb8fcc7e9e57",
  measurementId: "G-F6G9SK9M76"
};

// Başlat
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let users = [];
let stData = {};
let hws = [];
let me = null;

function sync() {
  db.ref('users').on('value', s => { 
    const val = s.val();
    users = val ? Object.values(val) : []; 
    renderAdmin(); 
  });
  db.ref('stData').on('value', s => { 
    stData = s.val() || {}; 
    renderAdmin(); renderStd(); 
  });
  db.ref('hws').on('value', s => { 
    const val = s.val();
    hws = val ? Object.values(val) : []; 
    renderStd(); 
  });
  setTimeout(() => document.getElementById('loader').style.display='none', 1500);
}
sync();

function doLogin() {
  const id = document.getElementById('lid').value.trim();
  const pw = document.getElementById('lpw').value;
  if ((id.toLowerCase() === 'omar' || id === 'عمر') && pw === '123') {
    me = { id: 'admin', name: 'الأستاذ عمر', role: 'admin' };
    startApp();
    return;
  }
  const user = users.find(u => (u.name === id || u.phone === id) && u.pass === pw);
  if (user) { me = user; startApp(); } 
  else { toast('بيانات الدخول خاطئة'); }
}

function doReg() {
  const n = document.getElementById('rn').value.trim();
  const p = document.getElementById('rp').value.trim();
  const w = document.getElementById('rw').value;
  if(!n || !w) { toast('الرجاء تعبئة الحقول'); return; }
  const uid = 'u' + Date.now();
  db.ref('users/' + uid).set({ id: uid, name: n, phone: p, pass: w, role: 'student' })
    .then(() => { toast('تم التسجيل بنجاح'); authT('login'); });
}

function startApp() {
  document.getElementById('auth-wrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sname').textContent = me.name;
  document.getElementById('srole').textContent = me.role === 'admin' ? 'مدير النظام' : 'طالب';
  let h = '';
  if(me.role === 'admin') {
    h += <div class="nav-item" onclick="goP('admin')">👥 الطلاب</div>;
    h += <div class="nav-item" onclick="goP('hw')">📝 إرسال واجب</div>;
  } else {
    h += <div class="nav-item" onclick="goP('std')">🏠 لوحة الطالب</div>;
  }
  document.getElementById('nlist').innerHTML = h;
  goP(me.role === 'admin' ? 'admin' : 'std');
}

function renderAdmin() {
  const tb = document.getElementById('stbody');
  if(!tb || me.role !== 'admin') return;
  const students = users.filter(u => u.role === 'student');
  tb.innerHTML = students.map(u => {
    const d = stData[u.id] || { rem: 0, total: 0, fee: 0 };
    return `<tr>
      <td><b>${u.name}</b></td>
      <td style="color:${d.rem < 2 ? 'red':'green'}">${d.rem}</td>
      <td>${d.total}</td>
      <td>${d.fee}₺</td>
      <td><button class="btn-main" style="width:auto; padding:5px 10px; background:green" onclick="att('${u.id}')">حضر ✓</button></td>
    </tr>`;
  }).join('');
  document.getElementById('mst-id').innerHTML = students.map(u => <option value="${u.id}">${u.name}</option>).join('');
  document.getElementById('hw-sel').innerHTML = students.map(u => <option value="${u.id}">${u.name}</option>).join('');
}

function renderStd() {
  if(!me || me.role !== 'student') return;
  const d = stData[me.id] || { rem: 0, fee: 0 };
  document.getElementById('s-rem').textContent = d.rem;
  document.getElementById('s-fee').textContent = d.fee;
  const myHw = hws.filter(h => h.stId === me.id).reverse();
  document.getElementById('st-hw').innerHTML = myHw.map(h => `
    <div style="background:#f0f7ff; padding:12px; border-radius:10px; margin-bottom:10px; border-right:4px solid var(--primary)">
      <small style="color:#888">${h.date}</small>
      <p style="margin-top:5px">${h.text}</p>
    </div>
  `).join('');
}

function att(id) {
  if(!stData[id] || stData[id].rem <= 0) { toast('لا توجد حصص متبقية'); return; }
  db.ref('stData/' + id + '/rem').set(stData[id].rem - 1);
}

function svSt() {
  const i = document.getElementById('mst-id').value;
  const t = parseInt(document.getElementById('mst-t').value);
  const f = parseInt(document.getElementById('mst-f').value) || 0;
  if(!i || isNaN(t)) return;
  db.ref('stData/' + i).set({ total: t, rem: t, fee: f });
  clM();
  toast('تم تحديث البيانات');
}

function sendHW() {
    const stId = document.getElementById('hw-sel').value;
    const txt = document.getElementById('hw-txt').value;
    if(!stId || !txt) return;
    const hid = Date.now();
    db.ref('hws/' + hid).set({ id: hid, stId, text: txt, date: new Date().toLocaleDateString('ar-EG') });
    document.getElementById('hw-txt').value = '';
    toast('تم إرسال الواجب');
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.className = 'show';
  setTimeout(() => t.className = '', 3000);
}
function authT(m) {
  document.getElementById('a-login').style.display = m==='login'?'block':'none';
  document.getElementById('a-reg').style.display = m==='reg'?'block':'none';
  document.getElementById('tl').className = 'tab' + (m==='login'?' active':'');
  document.getElementById('tr').className = 'tab' + (m==='reg'?' active':'');
}
function goP(p) {
  document.querySelectorAll('.page').forEach(x => x.style.display = 'none');
  document.getElementById('p-' + p).style.display = 'block';
  togSide(false);
}
function togSide(f) { document.getElementById('sidebar').classList.toggle('open', f); }
function opStM() { document.getElementById('mst').style.display='flex'; }
function clM() { document.querySelectorAll('.modal-overlay').forEach(x => x.style.display='none'); }
function doLogout() { location.reload(); }
</script>
</body>
</html>
