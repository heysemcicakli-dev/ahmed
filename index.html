<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الأستاذ عمر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Alternatif Kaynak üzerinden Firebase (Daha Güvenilir) -->
    <script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>

    <style>
        :root { --p:#1a5276; --g:#c9a84c; --bg:#f0f4f8; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background:var(--bg); direction:rtl; }
        #loader { position:fixed; inset:0; background:white; z-index:10000; display:flex; align-items:center; justify-content:center; flex-direction:column; font-weight:bold; }
        .spinner { width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--p); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:10px; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        #auth-w { position:fixed; inset:0; background:linear-gradient(135deg,#0d2137,#1a5276); display:flex; align-items:center; justify-content:center; z-index:9000; padding:20px; }
        .auth-c { background:white; padding:30px; border-radius:24px; width:100%; max-width:400px; box-shadow:0 20px 50px rgba(0,0,0,0.3); text-align:center; }
        .inp { width:100%; padding:12px; margin-bottom:15px; border:2px solid #eee; border-radius:12px; outline:none; text-align:right; }
        .btn { width:100%; padding:14px; border:none; border-radius:12px; background:var(--p); color:white; font-weight:700; cursor:pointer; }
        #app { display:none; padding:20px; max-width:600px; margin:0 auto; }
        .card { background:white; padding:20px; border-radius:18px; box-shadow:0 5px 15px rgba(0,0,0,0.05); margin-bottom:20px; }
        .st-item { display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee; }
        #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background:#333; color:white; padding:10px 25px; border-radius:50px; transition:0.3s; z-index:11000; }
        #toast.show { transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span id="load-status">جاري الاتصال بالسحاب...</span></div>
<div id="toast"></div>

<!-- GİRİŞ -->
<div id="auth-w">
    <div class="auth-c">
        <h2 style="color:var(--p); margin-bottom:20px;">📚 نظام الأستاذ عمر</h2>
        <div id="login-box">
            <input type="text" id="l-id" class="inp" placeholder="الاسم أو الهاتف (عمر / omar)">
            <input type="password" id="l-pw" class="inp" placeholder="كلمة المرور">
            <button class="btn" onclick="window.doLogin()">دخول للنظام</button>
            <p onclick="window.showReg(true)" style="margin-top:15px; cursor:pointer; color:#888; font-size:12px;">إنشاء حساب طالب جديد</p>
        </div>
        <div id="reg-box" style="display:none">
            <input type="text" id="r-n" class="inp" placeholder="اسم الطالب الكامل">
            <input type="password" id="r-w" class="inp" placeholder="كلمة المرور">
            <button class="btn" style="background:var(--g)" onclick="window.doReg()">تأكيد التسجيل</button>
            <p onclick="window.showReg(false)" style="margin-top:15px; cursor:pointer; color:#888; font-size:12px;">العودة لتسجيل الدخول</p>
        </div>
    </div>
</div>

<!-- UYGULAMA -->
<div id="app">
    <div id="adm-v" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <h3>👥 الطلاب</h3>
                <button class="btn" style="width:auto; padding:5px 15px; font-size:12px" onclick="window.setSt()">إعداد الحصص</button>
            </div>
            <div id="st-list"></div>
        </div>
        <div class="card">
            <h3>📝 إرسال واجب</h3>
            <select id="h-target" class="inp"></select>
            <textarea id="h-txt" class="inp" style="height:80px" placeholder="اكتب الواجب هنا..."></textarea>
            <button class="btn" onclick="window.sendHw()">إرسال الواجب</button>
        </div>
    </div>

    <div id="std-v" style="display:none">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div class="card" style="text-align:center"><h4>متبقي</h4><h1 id="s-rem" style="color:var(--p)">0</h1></div>
            <div class="card" style="text-align:center"><h4>الرسوم</h4><h1 id="s-fee" style="color:var(--g)">0</h1></div>
        </div>
        <div class="card"><h3>📝 الواجبات</h3><div id="my-hws"></div></div>
    </div>
    
    <button onclick="location.reload()" style="width:100%; border:none; background:none; color:red; margin-top:20px; cursor:pointer; font-weight:bold;">تسجيل الخروج 🚪</button>
</div>

<script>
// Firebase Konfigürasyonu
const firebaseConfig = {
    apiKey: "AIzaSyCXuhxjwoxRSje-rL-1kylgWOIUUwnFtZ8",
    authDomain: "bsaer-omar-ahmed.firebaseapp.com",
    databaseURL: "https://bsaer-omar-ahmed-default-rtdb.firebaseio.com",
    projectId: "bsaer-omar-ahmed",
    storageBucket: "bsaer-omar-ahmed.firebasestorage.app",
    messagingSenderId: "246394105206",
    appId: "1:246394105206:web:0337e80d87cb8fcc7e9e57"
};

// Kritik Kontrol: Firebase yüklendi mi?
if (typeof firebase === 'undefined') {
    document.getElementById('load-status').innerHTML = "⚠️ خطأ: فشل تحميل المكتبات. يرجى تحديث الصفحة.";
} else {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let users = {}, stData = {}, hws = {}, me = null;

    // Verileri Senkronize Et
    db.ref('/').on('value', (s) => {
        const v = s.val() || {};
        users = v.users || {};
        stData = v.stData || {};
        hws = v.hws || {};
        document.getElementById('loader').style.display = 'none';
        if(me) window.render();
    });

    // Fonksiyonlar (Window objesine bağlı)
    window.doLogin = function() {
        const id = document.getElementById('l-id').value.trim();
        const pw = document.getElementById('l-pw').value;
        if((id.toLowerCase()==='omar' || id==='عمر') && pw==='123') {
            me = {id:'admin', name:'الأستاذ عمر', role:'admin'};
        } else {
            me = Object.values(users).find(u => (u.name===id || u.phone===id) && u.pass===pw);
        }
        if(me) {
            document.getElementById('auth-w').style.display='none';
            document.getElementById('app').style.display='block';
            window.render();
        } else { window.toast('خطأ في البيانات'); }
    };

    window.doReg = function() {
        const n = document.getElementById('r-n').value.trim(), w = document.getElementById('r-w').value;
        if(!n || !w) return window.toast('أكمل البيانات');
        const uid = 'u' + Date.now();
        db.ref('users/'+uid).set({id:uid, name:n, pass:w, role:'student'})
        .then(() => { window.toast('تم التسجيل'); window.showReg(false); });
    };

    window.render = function() {
        const isA = me.role === 'admin';
        document.getElementById('adm-v').style.display = isA ? 'block' : 'none';
        document.getElementById('std-v').style.display = isA ? 'none' : 'block';
        if(isA) {
            const stds = Object.values(users).filter(u => u.role === 'student');
            document.getElementById('st-list').innerHTML = stds.map(u => `
                <div class="st-item">
                    <span><b>${u.name}</b> (${stData[u.id]?stData[u.id].rem:0})</span>
                    <button class="btn" style="width:auto; padding:5px 10px; background:green" onclick="window.att('${u.id}')">حضر</button>
                </div>
            `).join('');
            document.getElementById('h-target').innerHTML = stds.map(u => <option value="${u.id}">${u.name}</option>).join('');
        } else {
            const d = stData[me.id] || {rem:0, fee:0};
            document.getElementById('s-rem').innerText = d.rem;
            document.getElementById('s-fee').innerText = d.fee + '₺';
            const myH = Object.values(hws).filter(h => h.sid === me.id).reverse();
            document.getElementById('my-hws').innerHTML = myH.map(h => <div style="background:#f9f9f9; padding:10px; border-radius:10px; margin-bottom:10px; border-right:4px solid var(--p)"><small>${h.date}</small><p>${h.txt}</p></div>).join('');
        }
    };

    window.att = function(id) {
        const cur = stData[id] ? stData[id].rem : 0;
        if(cur <= 0) return window.toast('لا توجد حصص');
        db.ref('stData/'+id+'/rem').set(cur - 1);
    };

    window.setSt = function() {
        const n = prompt('اسم الطالب:');
        const t = Object.values(users).find(u => u.name === n);
        if(!t) return window.toast('غير موجود');
        const r = prompt('الحصص:', 8), f = prompt('الرسوم:', 0);
        db.ref('stData/'+t.id).set({rem:parseInt(r), fee:parseInt(f)});
    };

    window.sendHw = function() {
        const sid = document.getElementById('h-target').value, txt = document.getElementById('h-txt').value;
        if(!txt) return;
        db.ref('hws/'+Date.now()).set({sid, txt, date: new Date().toLocaleDateString('ar-EG')});
        document.getElementById('h-txt').value = '';
        window.toast('تم الإرسال');
    };

    window.showReg = function(s) {
        document.getElementById('login-box').style.display = s ? 'none' : 'block';
        document.getElementById('reg-box').style.display = s ? 'block' : 'none';
    };

    window.toast = function(m) {
        const t = document.getElementById('toast'); t.innerText = m; t.className = 'show';
        setTimeout(() => t.className = '', 3000);
    };
}
</script>
</body>
</html>
