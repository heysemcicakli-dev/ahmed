<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الأستاذ عمر - سحابي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<style>
:root { --p:#1a5276; --g:#c9a84c; --bg:#f0f2f5; --sw:260px; }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
#loader { position:fixed; inset:0; background:white; z-index:10000; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.spinner { width:40px; height:40px; border:4px solid #eee; border-top:4px solid var(--p); border-radius:50%; animation:s 1s linear infinite; }
@keyframes s { 100% { transform:rotate(360deg); } }
#auth-w { position:fixed; inset:0; background:linear-gradient(135deg,#0d2137,#1a5276); display:flex; align-items:center; justify-content:center; z-index:9000; padding:20px; }
.auth-c { background:white; padding:30px; border-radius:24px; width:100%; max-width:400px; box-shadow:0 20px 50px rgba(0,0,0,0.3); }
.inp { width:100%; padding:12px; margin-bottom:15px; border:2px solid #eee; border-radius:10px; outline:none; }
.btn { width:100%; padding:12px; border:none; border-radius:10px; background:var(--p); color:white; font-weight:700; cursor:pointer; }
#app { display:none; min-height:100vh; }
.sidebar { position:fixed; top:0; right:0; bottom:0; width:var(--sw); background:#0d2137; color:white; padding:25px; z-index:1000; transition:0.3s; }
.main { margin-right:var(--sw); padding:25px; }
@media (max-width:768px) { .sidebar { transform:translateX(100%); } .sidebar.open { transform:translateX(0); } .main { margin-right:0; } }
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background:#333; color:white; padding:10px 20px; border-radius:20px; transition:0.3s; z-index:11000; }
#toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p id="L-msg" style="margin-top:15px">جاري مزامنة البيانات...</p></div>
<div id="toast"></div>

<div id="auth-w">
    <div class="auth-c">
        <h2 style="text-align:center; color:var(--p); margin-bottom:20px;">📚 نظام الأستاذ عمر</h2>
        <input type="text" id="l-id" class="inp" placeholder="الاسم (عمر / omar)">
        <input type="password" id="l-pw" class="inp" placeholder="كلمة المرور">
        <button class="btn" onclick="doLogin()">دخول</button>
        <p onclick="document.getElementById('reg-area').style.display='block'" style="text-align:center; margin-top:15px; font-size:12px; cursor:pointer; color:#888;">تسجيل طالب جديد؟</p>
        <div id="reg-area" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:15px">
            <input type="text" id="r-n" class="inp" placeholder="اسم الطالب">
            <input type="password" id="r-w" class="inp" placeholder="كلمة المرور">
            <button class="btn" style="background:var(--g)" onclick="doReg()">إنشاء حساب</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="main" id="m-body">
        <div id="view-admin" style="display:none">
            <div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px">
                <h3>👥 الطلاب</h3>
                <div id="list-st"></div>
            </div>
            <div style="background:white; padding:20px; border-radius:15px">
                <h3>📝 إرسال واجب</h3>
                <select id="h-target" class="inp"></select>
                <textarea id="h-txt" class="inp" style="height:80px" placeholder="نص الواجب..."></textarea>
                <button class="btn" onclick="sendHw()">إرسال</button>
            </div>
        </div>
        <div id="view-std" style="display:none">
            <div style="background:white; padding:20px; border-radius:15px; text-align:center">
                <h4>حصص متبقية</h4>
                <h1 id="s-rem" style="color:var(--p); font-size:40px">0</h1>
            </div>
            <div id="my-hws" style="margin-top:20px"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCXuhxjwoxRSje-rL-1kylgWOIUUwnFtZ8",
  authDomain: "bsaer-omar-ahmed.firebaseapp.com",
  databaseURL: "https://bsaer-omar-ahmed-default-rtdb.firebaseio.com",
  projectId: "bsaer-omar-ahmed",
  storageBucket: "bsaer-omar-ahmed.firebasestorage.app",
  messagingSenderId: "246394105206",
  appId: "1:246394105206:web:0337e80d87cb8fcc7e9e57"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let u = {}, d = {}, h = {}, me = null;

// Bağlantı Sistemi
const loadTimer = setTimeout(() => {
    document.getElementById('L-msg').innerHTML = "⚠️ فشل الاتصال التلقائي. تحقق من الإعدادات.";
    setTimeout(hideL, 2000);
}, 6000);

db.ref('/').on('value', s => {
    clearTimeout(loadTimer);
    const v = s.val() || {};
    u = v.users || {}; d = v.stData || {}; h = v.hws || {};
    hideL();
    if(me) render();
}, err => {
    console.error(err);
    hideL();
});

function hideL() { document.getElementById('loader').style.display='none'; }

function doLogin() {
    const id = document.getElementById('l-id').value.trim();
    const pw = document.getElementById('l-pw').value;
    if((id.toLowerCase()==='omar' || id==='عمر') && pw==='123') me = {id:'admin', name:'الأستاذ عمر', role:'admin'};
    else me = Object.values(u).find(x => x.name===id && x.pass===pw);
    
    if(me) {
        document.getElementById('auth-w').style.display='none';
        document.getElementById('app').style.display='block';
        render();
    } else toast('خطأ في الدخول');
}

function doReg() {
    const n = document.getElementById('r-n').value, w = document.getElementById('r-w').value;
    if(!n || !w) return toast('أكمل البيانات');
    const uid = 'u' + Date.now();
    db.ref('users/'+uid).set({id:uid, name:n, pass:w, role:'student'}).then(() => toast('تم التسجيل'));
}

function render() {
    const isA = me.role === 'admin';
    document.getElementById('view-admin').style.display = isA?'block':'none';
    document.getElementById('view-std').style.display = isA?'none':'block';
    if(isA) {
        const stds = Object.values(u).filter(x => x.role==='student');
        document.getElementById('list-st').innerHTML = stds.map(x => `
            <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between;">
                <span>${x.name} | متبقي: ${d[x.id]?d[x.id].rem:0}</span>
                <button onclick="att('${x.id}')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:5px">حضر</button>
            </div>
        `).join('');
        document.getElementById('h-target').innerHTML = stds.map(x => <option value="${x.id}">${x.name}</option>).join('');
    } else {
        document.getElementById('s-rem').innerText = d[me.id] ? d[me.id].rem : 0;
        const myH = Object.values(h).filter(x => x.sid === me.id).reverse();
        document.getElementById('my-hws').innerHTML = myH.map(x => <div style="background:white; padding:15px; border-radius:10px; margin-bottom:10px"><b>${x.date}</b><p>${x.txt}</p></div>).join('');
    }
}

function att(id) {
    const cur = d[id] ? d[id].rem : 0;
    const nRem = prompt("عدد الحصص المتبقية الجديد:", cur);
    if(nRem !== null) db.ref('stData/'+id+'/rem').set(parseInt(nRem));
}

function sendHw() {
    const sid = document.getElementById('h-target').value, txt = document.getElementById('h-txt').value;
    if(!txt) return;
    db.ref('hws/'+Date.now()).set({sid, txt, date: new Date().toLocaleDateString('ar-EG')});
    document.getElementById('h-txt').value = '';
    toast('تم الإرسال');
}

function toast(m) {
    const t = document.getElementById('toast'); t.innerText = m; t.className = 'show';
    setTimeout(() => t.className = '', 3000);
}
</script>
</body>
</html>
