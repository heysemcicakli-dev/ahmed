<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الأستاذ عمر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<!-- Firebase v8 (En Stabil Versiyon) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root { --p:#1a5276; --g:#c9a84c; --bg:#f0f2f5; }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
body { background:var(--bg); direction:rtl; }

/* Giriş Ekranı */
#auth-w { position:fixed; inset:0; background:linear-gradient(135deg,#0d2137,#1a5276); display:flex; align-items:center; justify-content:center; z-index:9000; padding:20px; }
.auth-c { background:white; padding:30px; border-radius:24px; width:100%; max-width:400px; box-shadow:0 20px 50px rgba(0,0,0,0.3); text-align:center; }
.inp { width:100%; padding:12px; margin-bottom:15px; border:2px solid #eee; border-radius:12px; outline:none; text-align:right; }
.btn { width:100%; padding:14px; border:none; border-radius:12px; background:var(--p); color:white; font-weight:700; cursor:pointer; }
.tab-btn { background:none; border:none; color:#888; cursor:pointer; margin:10px; font-weight:bold; }
.tab-btn.active { color:var(--p); border-bottom:2px solid var(--p); }

/* Ana Uygulama */
#app { display:none; padding:20px; }
.card { background:white; padding:20px; border-radius:18px; box-shadow:0 5px 15px rgba(0,0,0,0.05); margin-bottom:20px; }
.st-row { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee; }

/* Toast */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background:#333; color:white; padding:10px 25px; border-radius:50px; transition:0.3s; z-index:10000; }
#toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- Auth -->
<div id="auth-w">
    <div class="auth-c">
        <h2 style="color:var(--p); margin-bottom:20px;">📚 نظام الأستاذ عمر</h2>
        <div id="login-form">
            <input type="text" id="l-id" class="inp" placeholder="الاسم أو الهاتف (عمر / omar)">
            <input type="password" id="l-pw" class="inp" placeholder="كلمة المرور">
            <button class="btn" onclick="doLogin()">دخول للنظام</button>
            <button class="tab-btn" onclick="showReg(true)">إنشاء حساب طالب جديد</button>
        </div>
        <div id="reg-form" style="display:none">
            <input type="text" id="r-n" class="inp" placeholder="اسم الطالب الكامل">
            <input type="text" id="r-p" class="inp" placeholder="رقم الهاتف">
            <input type="password" id="r-w" class="inp" placeholder="كلمة المرور">
            <button class="btn" style="background:var(--g)" onclick="doReg()">تأكيد التسجيل</button>
            <button class="tab-btn" onclick="showReg(false)">العودة للدخول</button>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="app">
    <div id="admin-view" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <h3>👥 قائمة الطلاب</h3>
                <button class="btn" style="width:auto; padding:5px 15px" onclick="updateSt()">إعداد الحصص</button>
            </div>
            <div id="student-list"></div>
        </div>
        <div class="card">
            <h3>📝 إرسال واجب</h3>
            <select id="h-target" class="inp" style="margin-top:10px"></select>
            <textarea id="h-txt" class="inp" style="height:80px" placeholder="اكتب الواجب هنا..."></textarea>
            <button class="btn" onclick="sendHw()">إرسال الواجب</button>
        </div>
    </div>

    <div id="std-view" style="display:none">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div class="card" style="text-align:center"><h4>المتبقي</h4><h1 id="s-rem" style="color:var(--p)">0</h1></div>
            <div class="card" style="text-align:center"><h4>الرسوم</h4><h1 id="s-fee" style="color:var(--g)">0</h1></div>
        </div>
        <div class="card">
            <h3>📝 الواجبات</h3>
            <div id="my-hws" style="margin-top:10px"></div>
        </div>
    </div>
    
    <button onclick="location.reload()" style="width:100%; background:none; border:none; color:red; margin-top:20px; cursor:pointer;">تسجيل الخروج 🚪</button>
</div>

<script>
// 1. Firebase Ayarları (Senin Bilgilerin)
const firebaseConfig = {
  apiKey: "AIzaSyCXuhxjwoxRSje-rL-1kylgWOIUUwnFtZ8",
  authDomain: "bsaer-omar-ahmed.firebaseapp.com",
  databaseURL: "https://bsaer-omar-ahmed-default-rtdb.firebaseio.com",
  projectId: "bsaer-omar-ahmed",
  storageBucket: "bsaer-omar-ahmed.firebasestorage.app",
  messagingSenderId: "246394105206",
  appId: "1:246394105206:web:0337e80d87cb8fcc7e9e57"
};

// Başlat
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let users = {}, stData = {}, hws = {}, me = null;

// Verileri Dinle
db.ref('/').on('value', (snapshot) => {
    const data = snapshot.val() || {};
    users = data.users || {};
    stData = data.stData || {};
    hws = data.hws || {};
    if(me) render();
});

function doLogin() {
    const id = document.getElementById('l-id').value.trim();
    const pw = document.getElementById('l-pw').value;

    if((id.toLowerCase()==='omar' || id==='عمر') && pw==='123') {
        me = {id:'admin', name:'الأستاذ عمر', role:'admin'};
    } else {
        me = Object.values(users).find(u => (u.name===id || u.phone===id) && u.pass===pw);
    }

    if(me) {
        document.getElementById('auth-w').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        render();
    } else {
        toast('خطأ في الاسم أو كلمة المرور');
    }
}

function doReg() {
    const n = document.getElementById('r-n').value.trim();
    const p = document.getElementById('r-p').value.trim();
    const w = document.getElementById('r-w').value;
    if(!n || !w) return toast('يرجى كتابة الاسم وكلمة المرور');
    
    const uid = 'u' + Date.now();
    db.ref('users/' + uid).set({id:uid, name:n, phone:p, pass:w, role:'student'})
    .then(() => { toast('تم التسجيل! يمكنك الدخول الآن'); showReg(false); });
}

function render() {
    const isAdm = me.role === 'admin';
    document.getElementById('admin-view').style.display = isAdm ? 'block' : 'none';
    document.getElementById('std-view').style.display = isAdm ? 'none' : 'block';

    if(isAdm) {
        const stds = Object.values(users).filter(u => u.role === 'student');
        document.getElementById('student-list').innerHTML = stds.map(u => `
            <div class="st-row">
                <span><b>${u.name}</b> (متبقي: ${stData[u.id]?stData[u.id].rem:0})</span>
                <button onclick="attendance('${u.id}')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:8px">حضر ✓</button>
            </div>
        `).join('');
        document.getElementById('h-target').innerHTML = stds.map(u => <option value="${u.id}">${u.name}</option>).join('');
    } else {
        const d = stData[me.id] || {rem:0, fee:0};
        document.getElementById('s-rem').innerText = d.rem;
        document.getElementById('s-fee').innerText = d.fee + '₺';
        const myHws = Object.values(hws).filter(h => h.sid === me.id).reverse();
        document.getElementById('my-hws').innerHTML = myHws.map(h => `
            <div style="background:#f9f9f9; padding:10px; border-radius:10px; margin-bottom:10px; border-right:4px solid var(--p)">
                <small>${h.date}</small><p>${h.txt}</p>
            </div>
        `).join('');
    }
}

function attendance(id) {
    const current = stData[id] ? stData[id].rem : 0;
    if(current <= 0) return toast('لا توجد حصص متبقية');
    db.ref('stData/' + id + '/rem').set(current - 1);
}

function updateSt() {
    const name = prompt('أدخل اسم الطالب بدقة:');
    const target = Object.values(users).find(u => u.name === name);
    if(!target) return toast('لم يتم العثور على الطالب');
    const rem = prompt('عدد الحصص المتبقية:', 8);
    const fee = prompt('الرسوم المستحقة:', 0);
    if(rem !== null) db.ref('stData/' + target.id).set({rem: parseInt(rem), fee: parseInt(fee)});
}

function sendHw() {
    const sid = document.getElementById('h-target').value;
    const txt = document.getElementById('h-txt').value.trim();
    if(!txt) return;
    db.ref('hws/' + Date.now()).set({sid, txt, date: new Date().toLocaleDateString('ar-EG')});
    document.getElementById('h-txt').value = '';
    toast('تم إرسال الواجب');
}

function toast(m) {
    const t = document.getElementById('toast'); t.innerText = m; t.className = 'show';
    setTimeout(() => t.className = '', 3000);
}
function showReg(s) {
    document.getElementById('login-form').style.display = s ? 'none' : 'block';
    document.getElementById('reg-form').style.display = s ? 'block' : 'none';
}
</script>
</body>
</html>
